<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0c1510" />
  <title>CartSync</title>
  <style>
    :root {
      --primary:        #4ecb71;
      --primary-light:  #62db85;
      --primary-pale:   #0d2018;
      --bg:             #0c1510;
      --surface:        #131c17;
      --surface-2:      #192520;
      --border:         #1e2e24;
      --text:           #d2e8d6;
      --text-muted:     #50725a;
      --checked-color:  #2c4035;
      --danger:         #e05252;
      --warn-bg:        #1a1500;
      --warn-border:    #3d3000;
      --warn-text:      #f0b940;
      --warn-sub:       #c09030;
      --radius:         14px;
      --radius-sm:      10px;
      --shadow:         0 2px 10px rgba(0,0,0,0.4);
      --shadow-md:      0 6px 24px rgba(0,0,0,0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #app { max-width: 480px; margin: 0 auto; position: relative; min-height: 100dvh; min-height: 100vh; }

    /* ===== HEADER ===== */
    .app-header {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: var(--surface); z-index: 100;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 6px; }
    .app-logo { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
    .header-right { display: flex; gap: 6px; align-items: center; }
    .btn-ghost {
      background: none; border: none; font-size: 13px; font-weight: 600;
      color: var(--text-muted); cursor: pointer; padding: 5px 10px;
      border-radius: 8px; transition: background 0.15s; font-family: inherit;
    }
    .btn-ghost:hover { background: var(--surface-2); }
    .store-tabs { display: flex; gap: 6px; padding: 6px 12px 10px; }
    .store-tab {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 4px; padding: 8px 4px; border: 1.5px solid var(--border);
      border-radius: var(--radius); background: var(--bg); font-size: 11px;
      font-weight: 600; color: var(--text-muted); cursor: pointer;
      transition: all 0.18s; white-space: nowrap; font-family: inherit;
    }
    .store-tab.active { background: var(--primary); border-color: var(--primary); color: #0c1510; }
    .tab-icon { font-size: 13px; }

    /* ===== MAIN ===== */
    main { padding-top: 112px; padding-bottom: 90px; min-height: 100dvh; min-height: 100vh; }
    .view { display: none; }
    .view.active { display: block; }

    /* ===== CATEGORY GROUP ===== */
    .category-group { margin-bottom: 2px; }
    .category-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 5px; background: var(--bg);
      position: sticky; top: 112px; z-index: 10;
    }
    .category-label { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
    .category-count { font-size: 11px; font-weight: 700; color: var(--text-muted); background: var(--border); border-radius: 10px; padding: 1px 7px; }

    /* ===== ITEM CARD ===== */
    .item-list { padding: 0 12px; display: flex; flex-direction: column; gap: 4px; }
    .item-card {
      display: flex; align-items: center; background: var(--surface);
      border-radius: var(--radius-sm); padding: 13px 14px; gap: 13px;
      border: 1px solid var(--border); transition: opacity 0.2s;
      cursor: pointer; user-select: none;
    }
    .item-card.checked { opacity: 0.35; }
    .item-check {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--border); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all 0.2s; background: var(--surface-2);
    }
    .item-card.checked .item-check { background: var(--primary); border-color: var(--primary); }
    .check-icon { font-size: 12px; color: #0c1510; display: none; }
    .item-card.checked .check-icon { display: block; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .item-card.checked .item-name { text-decoration: line-through; color: var(--checked-color); }
    .item-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .item-qty-badge { font-size: 12px; font-weight: 700; color: var(--primary); background: var(--primary-pale); border-radius: 6px; padding: 2px 8px; flex-shrink: 0; }
    .checked-section-label { padding: 12px 16px 4px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ===== EMPTY STATE ===== */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 32px; text-align: center; }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .empty-subtitle { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; }
    .btn-primary { background: var(--primary); color: #0c1510; border: none; border-radius: var(--radius); padding: 13px 28px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; font-family: inherit; }
    .btn-primary:active { background: var(--primary-light); }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; height: 62px;
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; border: none; background: none;
      cursor: pointer; font-size: 10px; font-weight: 600;
      color: var(--text-muted); transition: color 0.15s; padding: 8px 0; font-family: inherit;
    }
    .nav-btn.active { color: var(--primary); }
    .nav-icon { font-size: 20px; }

    /* ===== FAB ===== */
    .fab {
      position: fixed; bottom: 74px;
      right: max(16px, calc(50% - 224px));
      width: 54px; height: 54px;
      background: var(--primary); color: #0c1510; border: none;
      border-radius: 50%; font-size: 26px; font-weight: 400;
      cursor: pointer; z-index: 99;
      box-shadow: 0 4px 20px rgba(78,203,113,0.35);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s; line-height: 1;
    }
    .fab:active { transform: scale(0.91); box-shadow: 0 2px 10px rgba(78,203,113,0.2); }

    /* ===== OVERLAY ===== */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .overlay.active { opacity: 1; pointer-events: all; }

    /* ===== BOTTOM SHEET ===== */
    .sheet {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(105%);
      width: 100%; max-width: 480px;
      background: var(--surface); border-radius: 22px 22px 0 0;
      z-index: 201; transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 92dvh; max-height: 92vh; overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }
    .sheet.active { transform: translateX(-50%) translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 12px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--surface); z-index: 2;
    }
    .sheet-title { font-size: 18px; font-weight: 800; color: var(--text); }
    .sheet-close { background: var(--surface-2); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-family: inherit; }
    .sheet-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .form-input {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 16px; font-family: inherit;
      background: var(--surface-2); color: var(--text); outline: none;
      transition: border-color 0.15s; -webkit-appearance: none; appearance: none;
    }
    .form-input:focus { border-color: var(--primary); }
    .form-input.error { border-color: var(--danger); }
    .form-input option { background: var(--surface); color: var(--text); }
    /* Allow native date/time pickers on iOS — -webkit-appearance:none breaks them */
    input[type="date"].form-input,
    input[type="time"].form-input { -webkit-appearance: auto; appearance: auto; color-scheme: dark; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .store-checkboxes { display: flex; gap: 8px; }
    .store-chip {
      flex: 1; padding: 9px 6px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); background: var(--surface-2);
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      cursor: pointer; text-align: center; transition: all 0.15s; font-family: inherit;
    }
    .store-chip.selected { border-color: var(--primary); background: var(--primary-pale); color: var(--primary); }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; background: var(--surface-2); border-radius: var(--radius-sm); }
    .toggle-label { font-size: 14px; font-weight: 500; color: var(--text); }
    .toggle { width: 46px; height: 28px; background: var(--border); border-radius: 14px; position: relative; cursor: pointer; transition: background 0.2s; border: none; flex-shrink: 0; }
    .toggle.on { background: var(--primary); }
    .toggle::after { content: ''; position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .toggle.on::after { transform: translateX(18px); }
    .suggestions { background: var(--surface-2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; display: none; }
    .suggestions.visible { display: block; }
    .suggestion-item { padding: 11px 14px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: background 0.1s; color: var(--text); }
    .suggestion-item:not(:last-child) { border-bottom: 1px solid var(--border); }
    .suggestion-item:active { background: var(--border); }
    .suggestion-cat { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .sheet-footer { padding: 10px 20px 16px; border-top: 1px solid var(--border); }
    .btn-full { width: 100%; padding: 15px; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.15s; font-family: inherit; }
    .btn-full.primary { background: var(--primary); color: #0c1510; }
    .btn-full.primary:active { background: var(--primary-light); }

    /* ===== INVENTORY VIEW ===== */
    .inventory-topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; }
    .inv-title { font-size: 22px; font-weight: 800; color: var(--text); }
    .inv-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
    .search-wrap { padding: 4px 12px 8px; }
    .search-input { width: 100%; padding: 11px 14px 11px 38px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 15px; font-family: inherit; background: var(--surface-2); color: var(--text); outline: none; -webkit-appearance: none; }
    .search-input:focus { border-color: var(--primary); }
    .search-wrap-inner { position: relative; }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
    .inv-cat-header { padding: 12px 16px 5px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .inv-item { display: flex; align-items: center; background: var(--surface); border-radius: var(--radius-sm); padding: 12px 14px; gap: 12px; border: 1px solid var(--border); margin: 0 12px 4px; }
    .inv-item-info { flex: 1; min-width: 0; }
    .inv-item-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .inv-item-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; margin-top: 3px; }
    .store-badge { font-size: 10px; font-weight: 700; background: var(--primary-pale); color: var(--primary); border-radius: 5px; padding: 1px 6px; }
    .restock-badge { font-size: 10px; font-weight: 700; background: var(--warn-bg); color: var(--warn-text); border-radius: 5px; padding: 1px 6px; border: 1px solid var(--warn-border); }
    .add-list-btn { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 700; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit; flex-shrink: 0; }
    .add-list-btn.on-list { border-color: var(--primary); color: var(--primary); background: var(--primary-pale); }
    .del-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px; color: var(--text-muted); opacity: 0.4; flex-shrink: 0; }
    .del-btn:active { opacity: 1; }

    /* ===== RESTOCK MODAL ===== */
    .restock-form { display: flex; flex-direction: column; gap: 14px; padding: 20px; }
    .restock-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
    .restock-desc strong { color: var(--text); }
    .restock-input-row { display: flex; align-items: center; gap: 10px; }
    .restock-input { width: 70px; padding: 10px 12px; text-align: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 20px; font-weight: 700; font-family: inherit; outline: none; -webkit-appearance: none; background: var(--surface-2); color: var(--text); }
    .restock-input:focus { border-color: var(--primary); }
    .restock-unit { font-size: 14px; color: var(--text-muted); }
    .restock-btns { display: flex; gap: 10px; padding: 0 20px 20px; }
    .btn-outline { flex: 1; padding: 13px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; background: none; color: var(--text-muted); transition: all 0.15s; font-family: inherit; }
    .btn-outline:active { background: var(--surface-2); }
    .btn-save { flex: 2; }

    /* ===== RESTOCK NOTIFICATION ===== */
    .restock-notif { margin: 10px 12px 0; background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: var(--radius-sm); padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; }
    .notif-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .notif-text { flex: 1; }
    .notif-title { font-size: 13px; font-weight: 700; color: var(--warn-text); }
    .notif-sub { font-size: 12px; color: var(--warn-sub); margin-top: 2px; }
    .notif-add-btn { background: var(--warn-text); color: #1a1200; border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; margin-top: 2px; }

    /* ===== PILL TABS ===== */
    .pill-tabs { display: flex; gap: 6px; padding: 0 12px 8px; overflow-x: auto; scrollbar-width: none; }
    .pill-tabs::-webkit-scrollbar { display: none; }
    .pill-tab { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface-2); font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .pill-tab.active { background: var(--primary); border-color: var(--primary); color: #0c1510; }

    /* ===== MEAL PREP VIEW ===== */
    .mp-topbar { padding: 16px 16px 8px; }
    .mp-title { font-size: 22px; font-weight: 800; color: var(--text); }
    .mp-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .mp-card {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border-radius: var(--radius-sm);
      padding: 14px 16px; margin: 0 12px 8px; border: 1px solid var(--border);
      cursor: pointer; gap: 12px; transition: border-color 0.15s;
    }
    .mp-card:active { border-color: var(--primary); }
    .mp-card-info { flex: 1; min-width: 0; }
    .mp-card-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .mp-card-date { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .mp-card-badge { font-size: 12px; font-weight: 700; color: var(--primary); background: var(--primary-pale); border-radius: 6px; padding: 2px 8px; flex-shrink: 0; white-space: nowrap; }
    .meal-section-label { padding: 12px 20px 8px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-top: 1px solid var(--border); }
    .ing-row { display: flex; align-items: center; gap: 12px; padding: 11px 20px; border-bottom: 1px solid var(--border); }
    .ing-row:last-child { border-bottom: none; }
    .ing-name { flex: 1; font-size: 14px; color: var(--text); }
    .ing-add-list { background: none; border: 1.5px solid var(--border); border-radius: 7px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: var(--text-muted); cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: inherit; transition: all 0.15s; }
    .ing-add-list.added { border-color: var(--primary); color: var(--primary); background: var(--primary-pale); }
    .ing-del { background: none; border: none; font-size: 14px; cursor: pointer; padding: 4px; color: var(--text-muted); opacity: 0.4; flex-shrink: 0; }
    .ing-del:active { opacity: 1; }
    .add-ing-row { display: flex; align-items: center; gap: 10px; padding: 12px 20px 8px; }
    .add-ing-input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; background: var(--surface-2); color: var(--text); outline: none; -webkit-appearance: none; }
    .add-ing-input:focus { border-color: var(--primary); }
    .add-ing-btn { padding: 10px 14px; background: var(--primary); color: #0c1510; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; flex-shrink: 0; }
    .add-ing-btn:active { background: var(--primary-light); }
    .meal-del-btn { margin: 8px 20px 16px; width: calc(100% - 40px); padding: 12px; background: none; border: 1.5px solid var(--border); color: var(--text-muted); border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .meal-del-btn:active { border-color: var(--danger); color: var(--danger); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .category-group, .inv-item { animation: fadeSlideIn 0.18s ease; }
    .item-card { animation: fadeSlideIn 0.15s ease; }
    /* ===== LOADING SCREEN ===== */
    #loadingScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999; gap: 14px;
    }
    .loading-logo { font-size: 48px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.92)} }
    .loading-title { font-size: 22px; font-weight: 800; color: var(--primary); }
    .loading-sub   { font-size: 14px; color: var(--text-muted); }

    /* ===== SYNC DOT ===== */
    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
      transition: background 0.4s;
    }
    /* ===== SHARE BUTTON ===== */
    .share-btn {
      background: var(--primary-pale); border: 1.5px solid var(--primary);
      color: var(--primary); border-radius: 8px; padding: 5px 10px;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .share-btn:active { background: var(--primary); color: #0c1510; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<div id="loadingScreen">
  <div class="loading-logo">🛒</div>
  <div class="loading-title">CartSync</div>
  <div class="loading-sub" id="loadingMsg">Connecting…</div>
</div>

<div id="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-top">
      <span class="app-logo">🛒 CartSync</span>
      <div class="header-right">
        <div class="sync-dot" id="syncDot" title="Connecting…"></div>
        <button class="share-btn" id="shareBtn">🔗 Share</button>
        <button class="btn-ghost" id="clearCheckedBtn">Clear checked</button>
      </div>
    </div>
    <div class="store-tabs">
      <button class="store-tab active" data-store="wholefoods"><span class="tab-icon">🌿</span> Whole Foods</button>
      <button class="store-tab" data-store="walmart"><span class="tab-icon">⭐</span> Walmart</button>
      <button class="store-tab" data-store="other"><span class="tab-icon">🏪</span> Other</button>
    </div>
  </header>

  <!-- MAIN -->

// ── Household ID — shared between both phones via URL ────────────
function getHouseholdId() {
  const param = new URLSearchParams(window.location.search).get('home');
  if (param) { localStorage.setItem('cs_home', param); return param; }
  let id = localStorage.getItem('cs_home');
  if (!id) { id = uid(); localStorage.setItem('cs_home', id); }
  const url = new URL(window.location.href);
  if (!url.searchParams.get('home')) {
    url.searchParams.set('home', id);
    window.history.replaceState({}, '', url.toString());
  }
  return id;
}
const householdId = getHouseholdId();
const stateRef    = db.ref(`households/${householdId}`);

// ── Sync dot ─────────────────────────────────────────────────────
function setSyncDot(status) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  const colors = { online:'#4ecb71', syncing:'#f0b940', error:'#e05252', offline:'#555' };
  const labels = { online:'Synced ✓', syncing:'Syncing…', error:'Sync error', offline:'Offline' };
  dot.style.background = colors[status] || '#555';
  dot.title = labels[status] || '';
}

// ── Save: localStorage (instant) + Firebase (debounced) ──────────
let saveTimer = null;
function saveState() {
  localStorage.setItem('cartsync3', JSON.stringify(state));
  clearTimeout(saveTimer);
  setSyncDot('syncing');
  saveTimer = setTimeout(() => {
    stateRef.set(state)
      .then(()  => setSyncDot('online'))
      .catch(()  => setSyncDot('error'));
  }, 600);
}

function buildInitialState() {
  return {
    items: STARTER_ITEMS.map(it => ({
      id: uid(), name: it.name, category: it.category,
      stores: it.stores, quantity: 1, unit: '',
      onList: false, checked: false,
      restockAfter: null, tripsSince: 0,
      lastPurchased: null, addedAt: Date.now()
    })),
    mealPrep: [],
    tripCount: 0,
    lastTripDate: null,
  };
}

// State starts empty — Firebase populates it on load
let state = {};

// ── Ensure all required fields exist on state ────────────────────
// Firebase drops empty arrays and converts arrays-with-items to objects.
// This function restores everything back to proper JS arrays.
function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return Object.values(v); // Firebase object → array
}
function ensureStateFields() {
  state.items    = toArr(state.items);
  state.mealPrep = toArr(state.mealPrep);
  // Ensure every meal's ingredients is also a real array
  state.mealPrep.forEach(meal => { meal.ingredients = toArr(meal.ingredients); });
}

// ── Merge new STARTER_ITEMS into existing state ──────────────────
function mergeNewStarterItems() {
  const existingNames = new Set(state.items.map(i => i.name.toLowerCase()));
  let added = 0;
  STARTER_ITEMS.forEach(it => {
    if (!existingNames.has(it.name.toLowerCase())) {
      state.items.push({ id:uid(), name:it.name, category:it.category, stores:it.stores,
        quantity:1, unit:'', onList:false, checked:false, restockAfter:null,
        tripsSince:0, lastPurchased:null, addedAt:Date.now() });
      added++;
    }
  });
  if (added > 0) saveState();
}

function renderList() {
  const container = document.getElementById('list-container');
  const notifEl   = document.getElementById('restock-notifs');

  const due = getRestockDue().filter(it => it.stores.includes(currentStore));
  notifEl.innerHTML = due.length ? due.map(it => `
    <div class="restock-notif">
      <span class="notif-icon">🔔</span>
      <div class="notif-text">
        <div class="notif-title">Time to restock: ${esc(it.name)}</div>
        <div class="notif-sub">Last added ${it.tripsSince} trip${it.tripsSince!==1?'s':''} ago</div>
      </div>
      <button class="notif-add-btn" data-addid="${it.id}">Add</button>
    </div>`).join('') : '';

  notifEl.querySelectorAll('.notif-add-btn').forEach(b =>
    b.addEventListener('click', () => addToListFromNotif(b.dataset.addid))
  );

  const listItems = state.items.filter(it => it.onList && it.stores.includes(currentStore));
  if (!listItems.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">List is empty</div><div class="empty-subtitle">Go to Inventory to add your usual items, or tap <strong>+</strong> for something new.</div></div>`;
    return;
  }

  const unchecked = listItems.filter(i => !i.checked);
  const checked   = listItems.filter(i =>  i.checked);
  const grouped = {};
  unchecked.forEach(it => { (grouped[it.category] = grouped[it.category]||[]).push(it); });

  let html = '';
  CATEGORIES.forEach(cat => {
    const items = grouped[cat.id];
    if (!items?.length) return;
    html += `<div class="category-group">
      <div class="category-header">
        <span class="category-label"><span>${cat.icon}</span><span>${cat.name}</span></span>
        <span class="category-count">${items.length}</span>
      </div>
      <div class="item-list">${items.map(itemCardHTML).join('')}</div>
    </div>`;
  });

  if (checked.length) {
    html += `<div class="checked-section-label">✓ In cart (${checked.length})</div>`;
    html += `<div class="item-list" style="padding:0 12px 12px">${checked.map(itemCardHTML).join('')}</div>`;
  }

  container.innerHTML = html;
  container.querySelectorAll('.item-card').forEach(card =>
    card.addEventListener('click', () => toggleChecked(card.dataset.id))
  );
}

function itemCardHTML(item) {
  const qty = item.quantity > 1 ? `${item.quantity}${item.unit?' '+item.unit:''}` : (item.unit||'');
  return `<div class="item-card ${item.checked?'checked':''}" data-id="${item.id}">
    <div class="item-check"><span class="check-icon">✓</span></div>
    <div class="item-info">
      <div class="item-name">${esc(item.name)}</div>
      ${qty?`<div class="item-meta">${esc(qty)}</div>`:''}
    </div>
    ${item.quantity>1?`<div class="item-qty-badge">×${item.quantity}</div>`:''}
  </div>`;
}

// ================================================================
// RENDER: INVENTORY
// ================================================================
function renderInventory() {
  const container = document.getElementById('inventory-container');
  const subtitle  = document.getElementById('inv-subtitle');
  const search    = (document.getElementById('inventorySearch')?.value||'').toLowerCase();

  let items = [...state.items];
  if (search)         items = items.filter(i => i.name.toLowerCase().includes(search));
  if (invFilter==='onlist') items = items.filter(i => i.onList);
  if (invStoreFilter) items = items.filter(i => i.stores.includes(invStoreFilter));

  subtitle.textContent = `${items.length} item${items.length!==1?'s':''} · ${state.tripCount} trip${state.tripCount!==1?'s':''} logged`;

  if (!items.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No items found</div><div class="empty-subtitle">Try a different search or tap + to add.</div></div>`;
    return;
  }

  const grouped = {};
  items.forEach(it => { (grouped[it.category]=grouped[it.category]||[]).push(it); });

  let html = '';
  CATEGORIES.forEach(cat => {
    const catItems = grouped[cat.id];
    if (!catItems?.length) return;
    html += `<div class="inv-cat-header">${cat.icon} ${cat.name}</div>`;
    catItems.forEach(it => {
      const badges  = it.stores.map(s=>`<span class="store-badge">${STORE_LABELS[s]||s}</span>`).join('');
      const restock = it.restockAfter ? `<span class="restock-badge">↻ every ${it.restockAfter} trips</span>` : '';
      html += `<div class="inv-item">
        <div class="inv-item-info">
          <div class="inv-item-name">${esc(it.name)}</div>
          <div class="inv-item-meta">${badges}${restock}</div>
        </div>
        <button class="add-list-btn ${it.onList?'on-list':''}" data-id="${it.id}">${it.onList?'✓ On list':'+ Add'}</button>
        <button class="del-btn" data-del="${it.id}">🗑</button>
      </div>`;
    });
  });

  container.innerHTML = html;
  container.querySelectorAll('.add-list-btn').forEach(b => b.addEventListener('click', () => toggleOnList(b.dataset.id)));
  container.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => deleteItem(b.dataset.del)));

  // Long-press → restock
  container.querySelectorAll('.inv-item').forEach(row => {
    let timer;
    const id = row.querySelector('[data-id]')?.dataset.id || row.querySelector('[data-del]')?.dataset.del;
    row.addEventListener('pointerdown', () => { timer = setTimeout(() => { if(id) openRestockSheet(id); }, 600); });
    row.addEventListener('pointerup',   () => clearTimeout(timer));
    row.addEventListener('pointercancel',() => clearTimeout(timer));
  });
}

function renderAll() {
  renderList();
  if (currentView === 'inventory') renderInventory();
  if (currentView === 'mealprep')  renderMealPrep();
}

// ================================================================
// RENDER: MEAL PREP
// ================================================================
function renderMealPrep() {
  const container = document.getElementById('mealprep-container');
  const subtitle  = document.getElementById('mp-subtitle');
  const meals     = state.mealPrep || [];

  subtitle.textContent = `${meals.length} meal${meals.length !== 1 ? 's' : ''} planned`;

  if (!meals.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🍳</div><div class="empty-title">No meals planned</div><div class="empty-subtitle">Tap ＋ to add your first meal prep.</div></div>`;
    return;
  }

  container.innerHTML = meals.map(meal => {
    const dateStr  = meal.date ? new Date(meal.date + 'T00:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) : 'No date set';
    const ingCount = meal.ingredients.length;
    const onList   = meal.ingredients.filter(i => i.onList).length;
    return `<div class="mp-card" data-mealid="${meal.id}">
      <div class="mp-card-info">
        <div class="mp-card-name">🍽️ ${esc(meal.name)}</div>
        <div class="mp-card-date">📅 ${dateStr}</div>
      </div>
      ${ingCount ? `<div class="mp-card-badge">${onList}/${ingCount} listed</div>` : ''}
    </div>`;
  }).join('');

  container.querySelectorAll('.mp-card').forEach(card =>
    card.addEventListener('click', () => openMealDetail(card.dataset.mealid))
  );
}

// ================================================================
// ACTIONS: MEAL PREP
// ================================================================
function openCreateMealSheet() {
  document.getElementById('mealNameInput').value = '';
  document.getElementById('mealDateInput').value = '';
  document.getElementById('mealNameInput').classList.remove('error');
  openSheet('createMealSheet');
  setTimeout(() => document.getElementById('mealNameInput').focus(), 350);
}

function saveMeal() {
  const nameEl = document.getElementById('mealNameInput');
  const name   = nameEl.value.trim();
  if (!name) { nameEl.classList.add('error'); nameEl.focus(); return; }
  nameEl.classList.remove('error');
  const date = document.getElementById('mealDateInput').value;
  state.mealPrep = toArr(state.mealPrep); // safety: ensure array before push
  state.mealPrep.push({ id: uid(), name, date, ingredients: [] });
  saveState();
  closeSheet('createMealSheet');
  renderMealPrep();
}

function openMealDetail(id) {
  currentMealId = id;
  const meal = (state.mealPrep || []).find(m => m.id === id);
  if (!meal) return;
  document.getElementById('ingNameInput').value = '';
  renderMealDetail();
  openSheet('mealDetailSheet');
}

function renderMealDetail() {
  const meal = (state.mealPrep || []).find(m => m.id === currentMealId);
  if (!meal) return;

  const dateStr = meal.date
    ? new Date(meal.date + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' })
    : 'No date set';

  document.getElementById('detailMealTitle').textContent = meal.name;
  document.getElementById('mealDetailMeta').innerHTML =
    `<div style="font-size:13px;color:var(--text-muted);padding-bottom:4px;">📅 ${dateStr}</div>`;

  const list = document.getElementById('ingredientList');
  if (!meal.ingredients.length) {
    list.innerHTML = `<div style="padding:14px 20px;color:var(--text-muted);font-size:14px;">No ingredients yet — add below</div>`;
  } else {
    list.innerHTML = meal.ingredients.map(ing => `
      <div class="ing-row">
        <span class="ing-name">${esc(ing.name)}</span>
        <button class="ing-add-list ${ing.onList ? 'added' : ''}" data-ingid="${ing.id}">
          ${ing.onList ? '✓ On list' : '+ Add to list'}
        </button>
        <button class="ing-del" data-delingid="${ing.id}">✕</button>
      </div>`).join('');

    list.querySelectorAll('.ing-add-list').forEach(btn =>
      btn.addEventListener('click', () => addIngToShoppingList(btn.dataset.ingid))
    );
    list.querySelectorAll('.ing-del').forEach(btn =>
      btn.addEventListener('click', () => {
        const m = state.mealPrep.find(m => m.id === currentMealId);
        if (m) { m.ingredients = m.ingredients.filter(i => i.id !== btn.dataset.delingid); saveState(); renderMealDetail(); renderMealPrep(); }
      })
    );
  }
}

function addIngToShoppingList(ingId) {
  const meal = state.mealPrep.find(m => m.id === currentMealId);
  if (!meal) return;
  const ing = meal.ingredients.find(i => i.id === ingId);
  if (!ing || ing.onList) return;

  // Try to find in inventory
  const existing = state.items.find(i => i.name.toLowerCase() === ing.name.toLowerCase());
  if (existing) {
    existing.onList = true; existing.tripsSince = 0;
  } else {
    state.items.push({ id:uid(), name:ing.name, category:'other', stores:[currentStore],
      quantity:1, unit:'', onList:true, checked:false, restockAfter:null,
      tripsSince:0, lastPurchased:null, addedAt:Date.now() });
  }
  ing.onList = true;
  saveState(); renderMealDetail(); renderMealPrep();
}

function addIngredient() {
  const input = document.getElementById('ingNameInput');
  const name  = input.value.trim();
  if (!name) return;
  const meal = state.mealPrep.find(m => m.id === currentMealId);
  if (!meal) return;
  meal.ingredients = toArr(meal.ingredients); // safety: Firebase may have dropped the array
  meal.ingredients.push({ id: uid(), name, onList: false });
  input.value = '';
  saveState(); renderMealDetail(); renderMealPrep();
}

// ================================================================
// ACTIONS: SHOPPING LIST
// ================================================================
function toggleChecked(id) {
  const it = state.items.find(i => i.id === id);
  if (!it) return;
  it.checked = !it.checked;
  if (it.checked) it.lastPurchased = Date.now();
  saveState(); renderList();
}

function toggleOnList(id) {
  const it = state.items.find(i => i.id === id);
  if (!it) return;
  it.onList = !it.onList;
  if (!it.onList) it.checked = false;
  if (it.onList) it.tripsSince = 0;
  saveState(); renderAll();
}

function addToListFromNotif(id) {
  const it = state.items.find(i => i.id === id);
  if (!it) return;
  it.onList = true; it.checked = false; it.tripsSince = 0;
  saveState(); renderAll();
}

function clearChecked() {
  const items = state.items.filter(i => i.onList && i.stores.includes(currentStore) && i.checked);
  if (!items.length) return;
  state.tripCount++;
  state.lastTripDate = Date.now();
  items.forEach(it => { it.onList = false; it.checked = false; });
  state.items.forEach(all => { if (!all.onList) all.tripsSince = (all.tripsSince||0)+1; });
  saveState(); renderAll();
}

function deleteItem(id) {
  const it = state.items.find(i => i.id === id);
  if (!it || !confirm(`Remove "${it.name}" from inventory?`)) return;
  state.items = state.items.filter(i => i.id !== id);
  saveState(); renderInventory();
}

// ================================================================
// ADD ITEM SHEET
// ================================================================
function openAddSheet() {
  document.getElementById('addSheetTitle').textContent = 'Add Item';
  document.getElementById('newItemName').value = '';
  document.getElementById('newItemCategory').value = '';
  document.getElementById('newItemQty').value = '1';
  document.getElementById('newItemUnit').value = '';
  document.getElementById('newItemName').classList.remove('error');
  addSelectedStores = [currentStore];
  updateStoreChips();
  addToList = true; updateToggle();
  hideSuggestions();
  openSheet('addSheet');
  setTimeout(() => document.getElementById('newItemName').focus(), 350);
}

function saveItem() {
  const name = document.getElementById('newItemName').value.trim();
  const nameEl = document.getElementById('newItemName');
  if (!name) { nameEl.classList.add('error'); nameEl.focus(); return; }
  nameEl.classList.remove('error');
  const category = document.getElementById('newItemCategory').value || 'other';
  const qty  = parseInt(document.getElementById('newItemQty').value)||1;
  const unit = document.getElementById('newItemUnit').value.trim();
  const stores = addSelectedStores.length ? addSelectedStores : [currentStore];

  const existing = state.items.find(i => i.name.toLowerCase() === name.toLowerCase());
  if (existing) {
    existing.stores = [...new Set([...existing.stores,...stores])];
    existing.quantity = qty; if(unit) existing.unit = unit;
    if (addToList) { existing.onList = true; existing.tripsSince = 0; }
  } else {
    state.items.push({ id:uid(), name, category, stores, quantity:qty, unit,
      onList:addToList, checked:false, restockAfter:null, tripsSince:0,
      lastPurchased:null, addedAt:Date.now() });
  }
  saveState(); closeSheet('addSheet'); renderAll();
}

// ================================================================
// RESTOCK SHEET
// ================================================================
function openRestockSheet(id) {
  restockTargetId = id;
  const it = state.items.find(i => i.id === id);
  if (!it) return;
  document.getElementById('restockItemName').textContent = it.name;
  document.getElementById('restockCount').value = it.restockAfter || 2;
  openSheet('restockSheet');
}

function saveRestock() {
  const it = state.items.find(i => i.id === restockTargetId);
  if (!it) return;
  const val = parseInt(document.getElementById('restockCount').value);
  it.restockAfter = isNaN(val)||val<1 ? null : val;
  saveState(); closeSheet('restockSheet'); renderInventory();
}

function clearRestock() {
  const it = state.items.find(i => i.id === restockTargetId);
  if (it) { it.restockAfter = null; saveState(); }
  closeSheet('restockSheet'); renderInventory();
}

// ================================================================
// SHEET HELPERS
// ================================================================
function openSheet(id) {
  document.getElementById('overlay').classList.add('active');
  document.getElementById(id).classList.add('active');
}
function closeSheet(id) {
  document.getElementById(id).classList.remove('active');
  if (!document.querySelector('.sheet.active'))
    document.getElementById('overlay').classList.remove('active');
}

// ================================================================
// AUTOCOMPLETE: ADD ITEM
// ================================================================
function showSuggestions(query) {
  const el = document.getElementById('suggestions');
  if (!query) { el.classList.remove('visible'); return; }
  const q = query.toLowerCase();
  const matches = state.items.filter(i => i.name.toLowerCase().includes(q)).slice(0,6);
  if (!matches.length) { el.classList.remove('visible'); return; }
  el.innerHTML = matches.map(it => {
    const cat = getCat(it.category);
    return `<div class="suggestion-item" data-name="${esc(it.name)}" data-cat="${it.category}">
      <span>${esc(it.name)}</span><span class="suggestion-cat">${cat.icon} ${cat.name}</span>
    </div>`;
  }).join('');
  el.classList.add('visible');
  el.querySelectorAll('.suggestion-item').forEach(si =>
    si.addEventListener('mousedown', e => {
      e.preventDefault();
      document.getElementById('newItemName').value = si.dataset.name;
      document.getElementById('newItemCategory').value = si.dataset.cat;
      el.classList.remove('visible');
    })
  );
}
function hideSuggestions() { document.getElementById('suggestions').classList.remove('visible'); }

// ================================================================
// TOGGLE & STORE CHIPS
// ================================================================
function updateStoreChips() {
  document.querySelectorAll('.store-chip').forEach(b =>
    b.classList.toggle('selected', addSelectedStores.includes(b.dataset.store))
  );
}
function updateToggle() {
  document.getElementById('addToListToggle').classList.toggle('on', addToList);
}

// ================================================================
// INIT
// ================================================================
function init() {
  // Populate category select
  const sel = document.getElementById('newItemCategory');
  CATEGORIES.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = `${c.icon} ${c.name}`;
    sel.appendChild(o);
  });

  // Store tabs
  document.querySelectorAll('.store-tab').forEach(tab =>
    tab.addEventListener('click', () => {
      currentStore = tab.dataset.store;
      document.querySelectorAll('.store-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderList();
    })
  );

  // Bottom nav
  document.querySelectorAll('.nav-btn').forEach(btn =>
    btn.addEventListener('click', () => {
      currentView = btn.dataset.view;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(`${currentView}-view`).classList.add('active');

      if (currentView === 'inventory') renderInventory();
      if (currentView === 'mealprep')  renderMealPrep();
    })
  );

  // FAB — context-aware
  document.getElementById('fabBtn').addEventListener('click', () => {
    if (currentView === 'mealprep') openCreateMealSheet();
    else openAddSheet();
  });

  // Add item sheet close
  document.getElementById('addSheetClose').addEventListener('click', () => closeSheet('addSheet'));
  document.getElementById('overlay').addEventListener('click', () => {
    document.querySelectorAll('.sheet.active').forEach(s => closeSheet(s.id));
  });
  document.getElementById('saveItemBtn').addEventListener('click', saveItem);

  // Store chips
  document.querySelectorAll('.store-chip').forEach(b =>
    b.addEventListener('click', () => {
      const s = b.dataset.store;
      const idx = addSelectedStores.indexOf(s);
      idx >= 0 ? addSelectedStores.splice(idx,1) : addSelectedStores.push(s);
      updateStoreChips();
    })
  );

  // Add-to-list toggle
  document.getElementById('addToListToggle').addEventListener('click', () => { addToList = !addToList; updateToggle(); });

  // Item name autocomplete
  document.getElementById('newItemName').addEventListener('input', e => showSuggestions(e.target.value));
  document.getElementById('newItemName').addEventListener('blur', () => setTimeout(hideSuggestions, 180));
  document.getElementById('newItemName').addEventListener('keydown', e => {
    if (e.key === 'Enter') { hideSuggestions(); document.getElementById('newItemCategory').focus(); }
  });

  // Clear checked
  document.getElementById('clearCheckedBtn').addEventListener('click', clearChecked);

  // Inventory search + filter
  document.getElementById('inventorySearch').addEventListener('input', renderInventory);
  document.querySelectorAll('#inv-filter-tabs .pill-tab').forEach(tab =>
    tab.addEventListener('click', () => {
      document.querySelectorAll('#inv-filter-tabs .pill-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      if (tab.dataset.filter)       { invFilter = tab.dataset.filter; invStoreFilter = null; }
      if (tab.dataset.storeFilter)  { invFilter = 'all'; invStoreFilter = tab.dataset.storeFilter; }
      renderInventory();
    })
  );

  // Restock sheet
  document.getElementById('restockClose').addEventListener('click', () => closeSheet('restockSheet'));
  document.getElementById('restockSave').addEventListener('click', saveRestock);
  document.getElementById('restockClear').addEventListener('click', clearRestock);

  // ── Meal Prep sheets ───────────────────────────────────────────
  document.getElementById('createMealClose').addEventListener('click', () => closeSheet('createMealSheet'));
  document.getElementById('saveMealBtn').addEventListener('click', saveMeal);
  document.getElementById('mealNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('mealDateInput').focus(); });

  document.getElementById('mealDetailClose').addEventListener('click', () => closeSheet('mealDetailSheet'));
  document.getElementById('addIngBtn').addEventListener('click', addIngredient);
  document.getElementById('ingNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addIngredient(); });
  document.getElementById('deleteMealBtn').addEventListener('click', () => {
    const meal = state.mealPrep.find(m => m.id === currentMealId);
    if (!meal || !confirm(`Delete "${meal.name}"?`)) return;
    state.mealPrep = state.mealPrep.filter(m => m.id !== currentMealId);
    currentMealId = null;
    saveState(); closeSheet('mealDetailSheet'); renderMealPrep();
  });

  // ── Share button ───────────────────────────────────────────────
  document.getElementById('shareBtn').addEventListener('click', () => {
    const url = window.location.href;
    navigator.clipboard.writeText(url)
      .then(() => {
        const btn = document.getElementById('shareBtn');
        btn.textContent = '✓ Copied!';
        setTimeout(() => btn.textContent = '🔗 Share', 2000);
      })
      .catch(() => prompt('Copy this link to share with your wife:', url));
  });

  // ── Firebase: initial load + real-time listener ────────────────
  let appReady = false;

  stateRef.on('value', snap => {
    const data = snap.val();

    if (!appReady) {
      // ── First load ───────────────────────────────────────────
      appReady = true;
      if (data) {
        // Firebase has data — use it
        state = data;
        ensureStateFields();
        mergeNewStarterItems();
      } else {
        // No data yet — migrate from localStorage or build fresh
        const saved = localStorage.getItem('cartsync3');
        try { state = saved ? JSON.parse(saved) : buildInitialState(); }
        catch(e) { state = buildInitialState(); }
        ensureStateFields();
        mergeNewStarterItems();
        stateRef.set(state); // push to Firebase for the first time
      }
      document.getElementById('loadingScreen').style.display = 'none';
      setSyncDot('online');
      renderList();
      return;
    }

    // ── Subsequent calls = live update from other device ────────
    if (!data) return;
    const incoming = JSON.stringify(data);
    const current  = JSON.stringify(state);
    if (incoming === current) return; // no real change, skip
    state = data;
    ensureStateFields();
    renderAll();
    setSyncDot('online');
  });

  // Fallback: if Firebase doesn't respond in 5 seconds, load from localStorage
  setTimeout(() => {
    if (appReady) return;
    appReady = true;
    document.getElementById('loadingMsg').textContent = 'Working offline…';
    const saved = localStorage.getItem('cartsync3');
    try { state = saved ? JSON.parse(saved) : buildInitialState(); }
    catch(e) { state = buildInitialState(); }
    ensureStateFields();
    mergeNewStarterItems();
    document.getElementById('loadingScreen').style.display = 'none';
    setSyncDot('offline');
    renderList();
  }, 5000);
}

init();
</script>
</body>
</html>
